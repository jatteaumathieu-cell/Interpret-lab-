  .search-icon { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:16px; }
  .suggestions-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-bottom:10px; }

const POPULAR = ['Dior Sauvage','Bleu de Chanel','Black Opium','Baccarat Rouge 540','Aventus','1 Million','Acqua di Giò','Flowerbomb','Le Male','Angel','Santal 33','La Vie est Belle'];

let selectedMainstream = null;

function init() {
  document.getElementById('footerCount').textContent = MAINSTREAM.length + ' références';
  const sugs = document.getElementById('suggestions');
  sugs.innerHTML = POPULAR.map(n => `<button class="sug-chip" onclick="selectByName('${n}')">${n}</button>`).join('');
}

function handleInput() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const dd = document.getElementById('dropdown');
  if (q.length < 2) { dd.style.display='none'; return; }
  const matches = MAINSTREAM.filter(p =>
    p.nom.toLowerCase().includes(q) || p.marque.toLowerCase().includes(q)
  ).slice(0, 10);
  if (matches.length === 0) { dd.style.display='none'; return; }
  dd.innerHTML = matches.map((p) => `
    <div class="dropdown-item" onclick="selectParfum(${MAINSTREAM.indexOf(p)})">
      <div class="di-name">${p.nom}</div>
      <div class="di-brand">${p.marque}</div>
    </div>`).join('');
  dd.style.display = 'block';
}

function selectByName(name) {
  const idx = MAINSTREAM.findIndex(p => `${p.marque} ${p.nom}`.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(p.nom.toLowerCase()));
  if (idx >= 0) selectParfum(idx);
}

function selectParfum(idx) {
  selectedMainstream = MAINSTREAM[idx];
  document.getElementById('searchInput').value = `${selectedMainstream.marque} — ${selectedMainstream.nom}`;
  document.getElementById('dropdown').style.display = 'none';
  showResults();
}

function scoreMatch(boutique, mainstream) {
  return boutique.notes.filter(n => mainstream.notes.includes(n)).length;
}

function matchPct(score, max) {
  if (score >= max) return 'Très proche';
  if (score >= max - 1) return 'Proche';
  if (score >= 2) return 'Similaire';
  return 'Inspiré de';
}

function showResults() {
  const ms = selectedMainstream;
  if (!ms) return;
  const scored = BOUTIQUE.map(b => ({
    ...b, score: scoreMatch(b, ms),
    common: b.notes.filter(n => ms.notes.includes(n))
  })).filter(b => b.score > 0).sort((a,b) => b.score - a.score).slice(0, 5);

  const section = document.getElementById('resultSection');
  if (scored.length === 0) {
    section.innerHTML = `<div class="no-result"><p>Aucun équivalent trouvé.<br>Reformulez la recherche.</p></div>`;
    return;
  }

  section.innerHTML = `
    <div class="result-section">
      <div class="result-header">
        <div class="result-searched">Équivalent niche de</div>
        <div class="result-perfume-name">${ms.nom}</div>
        <div class="result-perfume-brand">${ms.marque}</div>
        <div class="result-notes">${ms.notes.map(n=>`<span class="note-tag">${NOTE_LABELS[n]||n}</span>`).join('')}</div>
      </div>
      <div class="alts-label">Références en boutique</div>
      ${scored.map((b,i) => `
        <div class="alt-card">
          <div class="alt-rank">${i+1}</div>
          <div class="alt-body">
            <div class="alt-maison">${b.maison}</div>
            <div class="alt-nom">${b.nom}</div>
            <div class="alt-why">Partage les notes ${b.common.map(n=>NOTE_LABELS[n]||n).join(', ')} avec ${ms.marque} ${ms.nom}.</div>
            <div class="alt-notes">${b.notes.map(n=>`<span class="note-tag">${NOTE_LABELS[n]||n}</span>`).join('')}</div>
          </div>
          <span class="match-badge">${matchPct(b.score, ms.notes.length)}</span>
        </div>`).join('')}
    </div>`;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap') && !e.target.closest('.dropdown')) {
    document.getElementById('dropdown').style.display = 'none';
  }
});
