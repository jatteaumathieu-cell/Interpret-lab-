<meta charset="UTF-8">

<title>Interpret Lab — Trouvez votre équivalent niche</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-light: #E8D5A3; --dark: #0E0C0A; --dark2: #1A1714;

  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'Raleway',sans-serif; font-weight:300; min-height:100vh; }

header { background:var(–dark2); border-bottom:1px solid rgba(201,168,76,0.2); padding:20px; text-align:center; }
.brand { font-family:‘Cormorant Garamond’,serif; font-size:22px; font-weight:300; letter-spacing:6px; color:var(–gold); text-transform:uppercase; margin-bottom:4px; }
.tagline { font-size:10px; letter-spacing:2px; color:var(–text-dim); text-transform:uppercase; margin-bottom:16px; }
.gold-line { width:30px; height:1px; background:var(–gold); margin:0 auto; opacity:0.4; }

.main { max-width:700px; margin:0 auto; padding:24px 16px; }

.intro { text-align:center; margin-bottom:24px; }
.intro h2 { font-family:‘Cormorant Garamond’,serif; font-size:20px; font-weight:300; font-style:italic; color:var(–cream2); margin-bottom:8px; }
.intro p { font-size:11px; color:var(–text-dim); letter-spacing:1px; line-height:1.8; }

.search-wrap { position:relative; margin-bottom:16px; }
.search-wrap input { width:100%; background:var(–dark2); border:1px solid rgba(201,168,76,0.25); color:var(–cream); font-family:‘Raleway’,sans-serif; font-size:14px; padding:16px 16px 16px 44px; outline:none; transition:border 0.2s; letter-spacing:0.5px; }
.search-wrap input:focus { border-color:var(–gold); }
.search-wrap input::placeholder { color:var(–text-dim); font-style:italic; }
.search-icon { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(–text-dim); font-size:16px; }

.suggestions-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(–text-dim); margin-bottom:10px; }
.suggestions { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:24px; }
.sug-chip { background:transparent; border:1px solid rgba(201,168,76,0.18); color:var(–text-dim); font-family:‘Raleway’,sans-serif; font-size:11px; padding:7px 13px; cursor:pointer; transition:all 0.2s; font-style:italic; }
.sug-chip:hover { border-color:var(–gold); color:var(–gold); }

.dropdown { position:absolute; top:100%; left:0; right:0; background:var(–dark2); border:1px solid rgba(201,168,76,0.25); border-top:none; z-index:50; max-height:280px; overflow-y:auto; }
.dropdown-item { padding:12px 16px; cursor:pointer; border-bottom:1px solid rgba(201,168,76,0.07); transition:background 0.15s; }
.dropdown-item:hover { background:rgba(201,168,76,0.06); }
.dropdown-item:last-child { border-bottom:none; }
.di-name { font-family:‘Cormorant Garamond’,serif; font-size:15px; color:var(–cream); }
.di-brand { font-size:10px; color:var(–text-dim); letter-spacing:1px; margin-top:2px; }

.result-section { animation:fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }

.result-header { padding:16px 18px; background:var(–dark2); border:1px solid rgba(201,168,76,0.15); border-bottom:none; }
.result-searched { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(–text-dim); margin-bottom:6px; }
.result-perfume-name { font-family:‘Cormorant Garamond’,serif; font-size:22px; color:var(–cream); margin-bottom:2px; }
.result-perfume-brand { font-size:11px; color:var(–gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.result-notes { display:flex; flex-wrap:wrap; gap:4px; }
.note-tag { font-size:8px; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border:1px solid rgba(201,168,76,0.3); color:var(–gold); background:rgba(201,168,76,0.06); }

.alts-label { padding:12px 18px 8px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(–text-dim); background:var(–dark3); border:1px solid rgba(201,168,76,0.15); border-top:none; border-bottom:none; }

.alt-card { padding:16px 18px; border-bottom:1px solid rgba(201,168,76,0.08); background:var(–dark2); display:flex; gap:14px; align-items:flex-start; border-left:1px solid rgba(201,168,76,0.15); border-right:1px solid rgba(201,168,76,0.15); transition:background 0.15s; }
.alt-card:last-child { border-bottom:1px solid rgba(201,168,76,0.15); }
.alt-card:hover { background:var(–dark3); }

.alt-rank { font-family:‘Cormorant Garamond’,serif; font-size:24px; color:rgba(201,168,76,0.2); line-height:1; flex-shrink:0; width:24px; text-align:center; padding-top:2px; }
.alt-body { flex:1; }
.alt-maison { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(–gold); margin-bottom:3px; }
.alt-nom { font-family:‘Cormorant Garamond’,serif; font-size:18px; color:var(–cream); margin-bottom:6px; }
.alt-why { font-size:11px; color:var(–text); line-height:1.7; margin-bottom:8px; }
.alt-notes { display:flex; flex-wrap:wrap; gap:3px; }
.match-badge { font-size:8px; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; background:rgba(201,168,76,0.12); color:var(–gold); border:1px solid rgba(201,168,76,0.3); flex-shrink:0; align-self:flex-start; }

.no-result { padding:40px; text-align:center; border:1px solid rgba(201,168,76,0.1); background:var(–dark2); }
.no-result p { font-family:‘Cormorant Garamond’,serif; font-size:18px; font-style:italic; color:var(–text-dim); }

footer { text-align:center; padding:20px; font-size:9px; letter-spacing:2px; color:var(–text-dim); border-top:1px solid rgba(201,168,76,0.08); margin-top:32px; }
</style>

</head>

const POPULAR = ['Dior Sauvage','Bleu de Chanel','Black Opium','La Vie est Belle','Aventus','1 Million','Acqua di Giò','Flowerbomb','Le Male','Angel'];

let selectedMainstream = null;

function init() {
  const sugs = document.getElementById('suggestions');
  sugs.innerHTML = POPULAR.map(n => `<button class="sug-chip" onclick="selectByName('${n}')">${n}</button>`).join('');
}

function handleInput() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const dd = document.getElementById('dropdown');
  if (q.length < 2) { dd.style.display='none'; return; }
  const matches = MAINSTREAM.filter(p =>
    p.nom.toLowerCase().includes(q) || p.marque.toLowerCase().includes(q)
  ).slice(0, 8);
  if (matches.length === 0) { dd.style.display='none'; return; }
  dd.innerHTML = matches.map((p,i) => `
    <div class="dropdown-item" onclick="selectParfum(${i + MAINSTREAM.indexOf(p)})">
      <div class="di-name">${p.nom}</div>
      <div class="di-brand">${p.marque}</div>
    </div>`).join('');
  dd.style.display = 'block';
}

function selectByName(name) {
  const idx = MAINSTREAM.findIndex(p => `${p.marque} ${p.nom}`.includes(name) || name.includes(p.nom));
  if (idx >= 0) selectParfum(idx);
}

function selectParfum(idx) {
  selectedMainstream = MAINSTREAM[idx];
  document.getElementById('searchInput').value = `${selectedMainstream.marque} ${selectedMainstream.nom}`;
  document.getElementById('dropdown').style.display = 'none';
  showResults();
}

function scoreMatch(boutique, mainstream) {
  const common = boutique.notes.filter(n => mainstream.notes.includes(n));
  return common.length;
}

function showResults() {
  const ms = selectedMainstream;
  if (!ms) return;

  // Score tous les parfums boutique
  const scored = BOUTIQUE.map(b => ({
    ...b,
    score: scoreMatch(b, ms),
    common: b.notes.filter(n => ms.notes.includes(n))
  })).filter(b => b.score > 0).sort((a,b) => b.score - a.score).slice(0, 5);

  const NOTE_LABELS = {
    oud:'Oud',floral:'Floral',boise:'Boisé',agrume:'Agrume',vanille:'Vanille',
    ambre:'Ambre',musc:'Musc',epice:'Épicé',cafe:'Café',cuir:'Cuir',
    marin:'Marin',gourmand:'Gourmand',fume:'Fumé',vert:'Vert',encens:'Encens',patchouli:'Patchouli'
  };

  const matchPct = (score) => {
    const max = ms.notes.length;
    if (score >= max) return 'Très proche';
    if (score >= max - 1) return 'Proche';
    if (score >= 2) return 'Similaire';
    return 'Inspiré de';
  };

  const whyText = (b, ms) => {
    const common = b.notes.filter(n => ms.notes.includes(n));
    const labels = common.map(n => NOTE_LABELS[n]).join(', ');
    return `Partage les notes ${labels} avec ${ms.marque} ${ms.nom}.`;
  };

  const section = document.getElementById('resultSection');
  if (scored.length === 0) {
    section.innerHTML = `<div class="no-result"><p>Aucun équivalent trouvé dans le catalogue.</p></div>`;
    return;
  }

  section.innerHTML = `
    <div class="result-section">
      <div class="result-header">
        <div class="result-searched">Vous cherchez un équivalent de</div>
        <div class="result-perfume-name">${ms.nom}</div>
        <div class="result-perfume-brand">${ms.marque}</div>
        <div class="result-notes">
          ${ms.notes.map(n=>`<span class="note-tag">${NOTE_LABELS[n]||n}</span>`).join('')}
        </div>
      </div>
      <div class="alts-label">Équivalents niche en boutique</div>
      ${scored.map((b,i) => `
        <div class="alt-card">
          <div class="alt-rank">${i+1}</div>
          <div class="alt-body">
            <div class="alt-maison">${b.maison}</div>
            <div class="alt-nom">${b.nom}</div>
            <div class="alt-why">${whyText(b, ms)}</div>
            <div class="alt-notes">
              ${b.notes.map(n=>`<span class="note-tag">${NOTE_LABELS[n]||n}</span>`).join('')}
            </div>
          </div>
          <span class="match-badge">${matchPct(b.score)}</span>
        </div>`).join('')}
    </div>`;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap') && !e.target.closest('.dropdown')) {
    document.getElementById('dropdown').style.display = 'none';
  }
});

init();
